    /* VARIANT A — "Airbnb-warm". The warmth is the whitespace, never a beige tint:
       pure-white ground, one confident teal used only for meaning (primary action,
       operator identity, the next-action label), soft real shadow INSTEAD of a
       border on cards, 16px radii, generous interior padding.

       Single (light) theme by deliberate choice — see DECISIONS.md ADR-0037. The
       previous dark block rendered in headless capture while the fixed bottom bar
       stayed hardcoded light, so what shipped was never what was reviewed.
       Component styling stays inline in App.tsx but resolves through these vars. */
    :root {
      color-scheme: light;
      --bg: #ffffff;           /* pure-white ground — the air IS the warmth */
      --surface: #ffffff;      /* cards sit on the ground, lifted by shadow only */
      --surface-2: #f4f4f4;    /* inset field / next-action panel */
      --ink: #1c1c1c;          /* primary text */
      --ink-2: #5e5e5e;        /* secondary text — AA on both grounds */
      --ink-3: #b0b0b0;        /* non-text only: icons, dividers, placeholders */
      --line: #ebebeb;         /* hairline */
      --line-2: #dddddd;       /* field / unselected control border */
      --accent: #0f7a6c;       /* THE accent — primary action, identity, next action */
      --accent-press: #0b6357;
      --accent-soft: #d9eae7;  /* accent tint — chips only, never large fills */
      --on-accent: #ffffff;
      --money: #1c1c1c;        /* money is bold INK, never a colour (AVOID LIST) */
      --hot: #b3392e;  --hot-bg: #fbeceb;    /* Θερμός */
      --warm: #8a5a12; --warm-bg: #f8f0e2;   /* Χλιαρός */
      --cold: #2f6d7d; --cold-bg: #e8f1f4;   /* Ψυχρός */
      --danger: #b3392e;
      --r-card: 16px; --r-pill: 999px; --r-field: 12px; --r-btn: 14px;
      --pad-card: 16px;
      --shadow-card: 0 6px 20px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.04);
      --shadow-btn: 0 4px 14px rgba(15,122,108,.28);
      --dur: 120ms;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      font-family: "Commissioner", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 17px;   /* on the pinned scale — unstyled text no longer inherits the 16px UA default */
      -webkit-font-smoothing: antialiased;
      color: var(--ink);
    }
    button, input { font: inherit; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <noscript>Απαιτείται JavaScript για την εφαρμογή πωλήσεων.</noscript>
  <script type="module" src="/app.js"></script>
</body>
</html>
